<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHATbud</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="theme-color" content="#00a884">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="card">
            <h1>Welcome</h1>
            <p>Sign in to start chatting</p>
            <button id="login-btn">Sign in with Google</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2 id="user-name">Loading...</h2>
                <button id="logout-btn">Logout</button>
            </div>
            <div id="users-list">
                </div>
        </aside>

        <main id="chat-screen">
            <header>
                <h3 id="current-chat-name">Select a user to start chatting</h3>
            </header>

            <div id="chat-container">
                <div class="message system-msg" style="align-self: center; background: #e4e6eb; font-size: 13px;">
                    Pick someone from the sidebar to chat!
                </div>
            </div>

            <footer>
                <input type="file" id="image-input" accept="image/*" class="hidden">
                <button id="attach-btn" title="Attach Photo">📎</button>
                <button id="mic-btn" title="Record Voice Note">🎤</button>
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" disabled>
                <button id="send-btn" disabled>Send</button>
            </footer>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
